# CI: бэкенд (Go), фронтенд (web/) и ai-gateway (Python) — линт + тесты
# на каждый PR и push в main. Джобы независимы и идут параллельно.
# Деплой — на M9.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    # Postgres для интеграционных тестов (NEX_TEST_DATABASE_URL).
    # ВАЖНО: приложение подключается НЕ суперпользователем — образ
    # postgres делает POSTGRES_USER суперпользователем, а суперпользователь
    # обходит RLS даже с FORCE, и тесты изоляции tenant'ов ослепнут.
    # Поэтому суперпользователь — postgres, а роль nex создаётся шагом ниже
    # как обычная LOGIN-роль (как в проде).
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - name: Create non-superuser app role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c "CREATE ROLE nex LOGIN PASSWORD 'nex' NOSUPERUSER NOCREATEROLE"
          psql -h localhost -U postgres -c "CREATE DATABASE nex OWNER nex"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Версия зафиксирована: «latest» уже ломал main новыми правилами
          # (noctx на httptest). Обновление версии — осознанный PR.
          version: v2.12.2

      - name: Tests (race + Postgres)
        env:
          NEX_TEST_DATABASE_URL: postgres://nex:nex@localhost:5432/nex?sslmode=disable
        run: go test -race ./...

      - name: Build
        run: go build ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # Версия pnpm берётся из "packageManager" в корневом package.json —
      # один источник правды с локальной разработкой (см. package.json).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Типы (tsc --noEmit)
        run: pnpm -C web lint

      - name: Тесты (Vitest)
        run: pnpm -C web test

      - name: Build
        run: pnpm -C web build

  ai-gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-gateway

    # GIGACHAT_MOCK — тот же детерминированный мок-режим, что использует
    # tests/test_budget_e2e.py: app/main.py собирает FastAPI-приложение
    # на уровне модуля (см. `app = create_app()`), и ему нужен хотя бы
    # один зарегистрированный провайдер даже для импорта модуля тестами —
    # без реального ключа и без сетевых вызовов.
    env:
      GIGACHAT_MOCK: "true"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-gateway/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: ruff
        run: ruff check .

      - name: mypy (app/)
        run: mypy

      - name: pytest
        run: pytest -q
