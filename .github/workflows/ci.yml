# CI бэкенда: линт + тесты на каждый PR и push в main.
# Фронтенд-джоба добавится на вехе M7, деплой — на M9.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    # Postgres для интеграционных тестов (NEX_TEST_DATABASE_URL).
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: nex
          POSTGRES_PASSWORD: nex
          POSTGRES_DB: nex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nex -d nex"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # Версия зафиксирована: «latest» уже ломал main новыми правилами
          # (noctx на httptest). Обновление версии — осознанный PR.
          version: v2.12.2

      - name: Tests (race + Postgres)
        env:
          NEX_TEST_DATABASE_URL: postgres://nex:nex@localhost:5432/nex?sslmode=disable
        run: go test -race ./...

      - name: Build
        run: go build ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
