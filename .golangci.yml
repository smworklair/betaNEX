# Конфигурация golangci-lint (ADR-017).
# Запуск: make lint (или golangci-lint run).
version: "2"

linters:
  default: standard # govet, staticcheck, errcheck, ineffassign, unused
  enable:
    - misspell      # опечатки в комментариях и строках
    - revive        # стиль: замена golint
    - gosec         # типовые проблемы безопасности
    - sqlclosecheck # незакрытые rows/statements
    - bodyclose     # незакрытые тела HTTP-ответов
    - noctx         # HTTP-запросы без context
    - copyloopvar   # устаревшие копии переменных цикла
  exclusions:
    rules:
      # httptest.NewRequest в тестах не делает сетевого I/O — контекст
      # там не нужен; свежий noctx (golangci-lint >= 2.6) начал его
      # требовать, что для httptest — шум.
      - path: _test\.go$
        linters:
          - noctx

formatters:
  enable:
    - gofumpt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
