<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- Подсказка браузеру, что у страницы есть свои светлая и тёмная темы:
       без неё Samsung Internet в «тёмном режиме» сам инвертирует цвета
       и ломает стеклянные поверхности. -->
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#eef1f7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0d0f16">
  <title>NEX — КИС Колледж</title>
  <!-- Вынесено во внешний файл (public/compat.js), чтобы CSP мог запрещать
       'unsafe-inline' для script-src без хэшей/nonce. -->
  <script src="/compat.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
