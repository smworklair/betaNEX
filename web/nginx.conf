# Раздача собранного SPA (web/dist) — используется web/Dockerfile.
#
# /api/* сюда НЕ проксируется: в проде эту роль играет edge-прокси
# (Caddy, см. deploy/Caddyfile) перед nexd и этим контейнером — тот же
# принцип единого origin, что и в ручном раннбуке (deploy/README.md).
# Этот образ — самостоятельная альтернатива описанному там способу
# "собрать web/dist и отдать его Caddy как volume": тот же build,
# упакованный в образ вместо каталога на хосте.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: неизвестный путь (маршрут TanStack Router) отдаём index.html,
    # а не 404 — роутинг разбирает сам React на клиенте.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Для HEALTHCHECK ниже в Dockerfile и внешних проверок готовности.
    location = /healthz {
        default_type text/plain;
        return 200 "ok";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
